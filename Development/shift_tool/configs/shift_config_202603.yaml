# ============================================================
# はあとふる 2026年3月度 シフト設定
# 特定施設入居者生活介護事業所
# ============================================================

facility:
  name: "はあとふる"
  type: "特定施設入居者生活介護事業所"

month:
  year: 2026
  month: 3
  days: 31
  public_holidays: 9       # 公休日数（施設ごと・月ごとに変更可）
  working_days: 22          # 所定勤務日数

# シフトパターン定義
shifts:
  A:
    name: "A"
    start: "07:30"
    end: "15:30"
    category: "care"       # care=介護系, admin=管理系, cook=調理系
  B:
    name: "B"
    start: "09:30"
    end: "17:30"
    category: "care"
  C:
    name: "C"
    start: "12:30"
    end: "20:30"
    category: "care"
  D:
    name: "D"
    start: "08:30"
    end: "16:30"
    category: "care"
  E:
    name: "E"
    start: "08:30"
    end: "16:30"
    category: "admin"
  night:
    name: "夜勤"
    start: "17:00"
    end: "01:00+1"
    category: "care"
  dawn:
    name: "明け"
    start: "01:00"
    end: "09:00"
    category: "care"
  cook1:
    name: "調理1（早番）"
    start: "06:30"
    end: "08:30"
    category: "cook"
  cook2:
    name: "調理2（遅番）"
    start: "09:30"
    end: "17:30"
    category: "cook"

# 日別の特殊扱い
day_off_labels:
  - "休"     # 会社指定休
  - "希"     # 希望休
  - "有"     # 有給休暇
  - "研"     # 研修（出勤扱い）
  - "健"     # 健診（出勤扱い）

work_counted_labels: ["研", "健"]  # 出勤日数に算入するラベル

# ============================================================
# 配置ルール
# ============================================================

placement_rules:
  # 配置ルール（各シフト正確に1名、2名以上配置しない）
  daily_required:
    care_shifts: ["A", "B", "C", "D", "night", "dawn"]
    each_count: 1
    each_max: 1      # 各シフト2名以上配置しない
    sunday_exception:
      shift: "A"
      allow_zero: true   # 日曜はAなし許容（最悪の場合のみ）

  # 24時間配置義務
  continuous_coverage: true

  # 介護職員だけで24時間配置が必須
  # 介護職員のみで①夜,明,B,C ②夜,明,C,D のいずれかを各1名ずつセット
  care_only_coverage:
    best: ["night", "dawn", "B", "C"]     # 最優先パターン
    best_alt: ["night", "dawn", "C", "D"] # 同等パターン
    good: ["night", "dawn", "A", "C"]     # 次点（Aが30分早出or明け残業）
    worst: ["night", "dawn", "A"]          # 最悪（30分残業）
    worst_alt: ["night", "dawn", "D"]     # 最悪（Dが30分残業）

  # 介護職員＋生活相談員＋機能訓練指導員でA,B,C,D,夜,明を各1人ずつ
  care_plus_related_coverage:
    roles: ["介護職員", "生活相談員", "機能訓練指導員"]
    shifts: ["A", "B", "C", "D", "night", "dawn"]
    each_count: 1
    each_max: 1

  # 調理員配置（各シフト正確に1名、2名以上配置しない）
  cook_daily:
    cook1: 1
    cook1_max: 1
    cook2: 1
    cook2_max: 1

  # 兼任者の人員カウント
  dual_role_counting:
    - name: "渡邊 哲也"
      night_dawn_role: "介護職員"    # 夜/明は介護職員カウント
      E_role: "計画作成担当者"         # Eは専門職カウント
    - name: "吉玉 薫"
      night_dawn_role: "介護職員"
      E_role: "管理者"

  # 人員過剰時の調整ルール
  overstaffing_adjustments:
    - action: "remove_night_dawn"
      target: "吉玉 薫"
      description: "吉玉の夜明をなくしEのみにする"
    - action: "reduce_days"
      targets: ["甲斐 裕美子", "辰見 イツ子", "甲斐 静幸"]
      priority_reduce: "甲斐 裕美子"
      description: "パートの日数を削減（甲斐裕美子を優先的に）"

# ============================================================
# 勤務制約
# ============================================================

work_constraints:
  # 3勤1休
  work_rest_pattern:
    max_consecutive_work: 3
    prefer_consecutive_rest: true

  # 連続勤務制限（月跨ぎ含む）
  max_consecutive_days: 3

  # 夜勤サイクル: 公休→夜→明→公休
  night_cycle:
    pattern: ["off", "night", "dawn", "off"]
    exceptions: ["吉玉 薫"]  # 吉玉は除外

# ============================================================
# スタッフ情報
# ============================================================

staff:
