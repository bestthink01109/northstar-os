    name: "吉玉 薫"
    role: "管理者"
    employment: "常勤"
    allowed_shifts: ["E", "night", "dawn"]
    disallowed_shifts: ["A", "B", "C", "D"]
    night_per_week: [1, 2]    # 週1〜2回
    public_holidays: 9
    working_days: 22

